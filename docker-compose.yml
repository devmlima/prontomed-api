version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: prontomed-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: prontomed
      MYSQL_USER: prontomed
      MYSQL_PASSWORD: prontomed123
    ports:
      - "3306:3306"
    volumes:
      - prontomed-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  prontomed-mysql-data:
